name: Extract Archive To Repo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Current files:"
          ls -la
          echo "Search archives:"
          find . -type f \( -name "*.tar.gz" -o -name "*.tgz" -o -name "*.zip" \)

      - name: Find archive
        run: |
          set -e
          ARCHIVE=$(find . -type f \( -name "*.tar.gz" -o -name "*.tgz" -o -name "*.zip" \) | head -n 1)
          if [ -z "$ARCHIVE" ]; then
            echo "No archive found in repository."
            exit 1
          fi
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "Found archive: $ARCHIVE"

      - name: Extract archive
        run: |
          set -e
          rm -rf extracted
          mkdir -p extracted

          if [[ "$ARCHIVE" == *.tar.gz || "$ARCHIVE" == *.tgz ]]; then
            tar -xzf "$ARCHIVE" -C extracted
          elif [[ "$ARCHIVE" == *.zip ]]; then
            unzip -q "$ARCHIVE" -d extracted
          else
            echo "Unsupported archive format: $ARCHIVE"
            exit 1
          fi

      - name: Copy extracted files into repository
        run: |
          set -e
          cp -r extracted/* . || true

      - name: Commit extracted files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Extract archive contents" || echo "Nothing to commit"
          git push
