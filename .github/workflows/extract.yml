name: Extract Archive

on:
  workflow_dispatch:
    inputs:
      archive_path:
        description: "Path to archive file inside the repo"
        required: true
        default: "to-best-flutter.tar.gz"

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify archive exists
        run: |
          set -e
          if [ ! -f "${{ github.event.inputs.archive_path }}" ]; then
            echo "Archive not found: ${{ github.event.inputs.archive_path }}"
            exit 1
          fi
          echo "Archive found."

      - name: Extract archive
        run: |
          set -e
          mkdir -p extracted

          FILE="${{ github.event.inputs.archive_path }}"

          if [[ "$FILE" == *.tar.gz || "$FILE" == *.tgz ]]; then
            tar -xzf "$FILE" -C extracted
          elif [[ "$FILE" == *.zip ]]; then
            unzip -q "$FILE" -d extracted
          else
            echo "Unsupported archive format: $FILE"
            exit 1
          fi

      - name: Show extracted files
        run: |
          echo "Extracted files:"
          find extracted -type f | sort

      - name: Upload extracted files
        uses: actions/upload-artifact@v4
        with:
          name: extracted-files
          path: extracted/
